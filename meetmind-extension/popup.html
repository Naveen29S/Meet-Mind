<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 300px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #FAFAFA;
      color: #333;
    }
    .header {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
    }
    .header h2 {
      margin: 0;
      font-size: 18px;
      background: linear-gradient(to right, #FF7A85, #B06AB3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .status {
      font-size: 14px;
      color: #666;
      margin-bottom: 24px;
      text-align: center;
    }
    .button {
      display: block;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-start {
      background: linear-gradient(to right, #FF7A85, #B06AB3);
      color: white;
      box-shadow: 0 4px 6px rgba(255, 122, 133, 0.2);
    }
    .btn-start:hover {
      box-shadow: 0 6px 12px rgba(255, 122, 133, 0.3);
      transform: translateY(-1px);
    }
    .btn-stop {
      background: #fff;
      color: #e11d48;
      border: 1px solid #e11d48;
    }
    .btn-stop:hover {
      background: #fff1f2;
    }
    .hidden {
      display: none;
    }
    .animation {
      width: 40px;
      height: 40px;
      margin: 0 auto 16px auto;
      border-radius: 50%;
      background: #B06AB3;
      animation: pulse 1.5s infinite;
      display: none;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(176, 106, 179, 0.7); }
      70% { box-shadow: 0 0 0 15px rgba(176, 106, 179, 0); }
      100% { box-shadow: 0 0 0 0 rgba(176, 106, 179, 0); }
    }
    .recording .animation {
      display: block;
    }
    .timer {
      font-size: 24px;
      font-family: monospace;
      font-weight: bold;
      text-align: center;
      margin-bottom: 16px;
      display: none;
      color: #B06AB3;
    }
    .recording .timer {
      display: block;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>MeetMind Recorder</h2>
  </div>
  
  <div id="statusContainer" class="status">
    Ready to record this tab's audio.
  </div>
  
  <div id="animation" class="animation"></div>
  <div id="timer" class="timer">00:00:00</div>

  <button id="startBtn" class="button btn-start">Start Recording Tab</button>
  <button id="stopBtn" class="button btn-stop hidden">Stop Recording</button>

  <script src="popup.js"></script>
</body>
</html>
